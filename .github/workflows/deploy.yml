name: Deploy to HostAfrica

on:
  push:
    branches:
      - master
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy (Static Export → FTP)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build static export ───────────────────────────────────────────
      #   next.config.js has output: 'export' — generates ./out directory
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # ── 5. Upload to HostAfrica via FTP ──────────────────────────────────
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Local folder to upload (Next.js static export output)
          local-dir: ./out/
          # Remote folder on HostAfrica — typically public_html/ for the main domain
          # or public_html/subdomain/ for a subdomain
          server-dir: /public_html/ 
          # Only upload files that changed (faster deploys)
          state-name: .ftp-deploy-sync-state.json
          # Skip uploading system/dev files
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/README.md
